<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Czkawka Web</title>
<link rel="stylesheet" href="style.css?v=2">
</head>
<body>
<div id="app">
    <header>
        <h1>Czkawka <span>Web</span></h1>
        <nav id="tools"></nav>
    </header>

    <main>
        <!-- Settings panel -->
        <section id="settings-panel">
            <h2>Directories</h2>
            <div id="dirs">
                <div id="included-dirs">
                    <label>Included paths:</label>
                    <div id="included-list"></div>
                    <div class="dir-add">
                        <input type="text" id="new-included" placeholder="/home/user/Downloads">
                        <button id="add-included">+</button>
                        <button class="browse-btn" data-target="included">📁 Browse</button>
                    </div>
                </div>
                <div id="excluded-dirs">
                    <label>Excluded paths:</label>
                    <div id="excluded-list"></div>
                    <div class="dir-add">
                        <input type="text" id="new-excluded" placeholder="/home/user/temp">
                        <button id="add-excluded">+</button>
                        <button class="browse-btn" data-target="excluded">📁 Browse</button>
                    </div>
                </div>
            </div>

            <h2>Options</h2>
            <div id="options">
                <label><input type="checkbox" id="recursive" checked> Recursive</label>
                <label><input type="checkbox" id="use-cache" checked> Use cache</label>
                <label>Min size: <input type="number" id="min-size" value="1024" style="width:80px"> bytes</label>
                <div id="tool-options"></div>
            </div>

            <button id="scan-btn">Scan</button>
            <button id="stop-btn" style="display:none">Stop</button>
            <div id="progress-bar" style="display:none">
                <div id="progress-fill"></div>
                <span id="progress-text"></span>
            </div>
        </section>

        <!-- Results panel -->
        <section id="results-panel" style="display:none">
            <h2>Results <span id="results-summary"></span></h2>
            <div id="results-table-wrapper">
                <table id="results-table">
                    <thead id="results-header"></thead>
                    <tbody id="results-body"></tbody>
                </table>
            </div>
            <div id="page-controls"></div>
            <div id="results-actions">
                <button id="delete-btn">Delete Selected</button>
            </div>
        </section>
    </main>

    <div id="status-bar"></div>

    <!-- Folder browser modal -->
    <div id="folder-browser-overlay" class="modal-overlay" style="display:none">
        <div class="folder-browser">
            <div class="modal-header">
                <span class="modal-title">Select Folder</span>
                <button class="modal-close" id="folder-browser-close">✕</button>
            </div>
            <div class="modal-body">
                <div class="current-path-row">
                    <input type="text" class="current-path" id="folder-browser-path" value="/">
                </div>
                <div class="entry-list" id="folder-browser-entries"></div>
                <div class="loading" id="folder-browser-loading" style="display:none">Loading...</div>
                <div class="error" id="folder-browser-error" style="display:none"></div>
            </div>
            <div class="modal-footer">
                <button class="select-btn" id="folder-browser-select">Select This Folder</button>
            </div>
        </div>
    </div>
</div>
<script src="app.js?v=3"></script>
</body>
</html>
